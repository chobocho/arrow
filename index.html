<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>화살표 마인드맵</title>
<style>
  :root {
    --bg: #f6f6f9;
    --panel: #ffffff;
    --border: #e2e2ea;
    --accent: #3a7afe;
    --accent-2: #ffd166;
    --text: #222;
    --muted: #777;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
  }
  #app {
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 48px 1fr;
    height: 100%;
    width: 100%;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    flex-wrap: nowrap;
    overflow-x: auto;
  }
  header .title { font-weight: 700; margin-right: 8px; white-space: nowrap; }
  header .title #titleName { color: var(--muted); font-weight: 500; margin-left: 6px; }
  header .group { display: flex; gap: 4px; align-items: center; }
  header .spacer { flex: 1; }
  button.tool {
    appearance: none; border: 1px solid var(--border); background: #fff;
    color: var(--text); padding: 6px 10px; border-radius: 6px; cursor: pointer;
    font-size: 13px; white-space: nowrap;
  }
  button.tool:hover { background: #f0f3ff; }
  button.tool.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.tool[disabled] { opacity: 0.4; cursor: not-allowed; }
  button.tool.icon { font-size: 16px; line-height: 1; padding: 5px 9px; min-width: 36px; }
  label.field { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  label.field input[type=number], label.field input[type=color] {
    width: 56px; padding: 3px 4px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px;
  }
  label.field input[type=color] { width: 30px; height: 26px; padding: 0; }
  #canvasWrap {
    position: relative;
    background: #fafafa;
    overflow: hidden;
    touch-action: none;
  }
  canvas#mainCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
    display: block;
  }
  body[data-mode="select"] canvas#mainCanvas { cursor: default; }
  body[data-mode="pan"] canvas#mainCanvas { cursor: grab; }
  body[data-mode="text"] canvas#mainCanvas { cursor: text; }
  #statusBar {
    position: absolute;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #fff;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
  }
  #statusBar.visible { opacity: 1; }
  @media (max-width: 720px) {
    #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    header { flex-wrap: wrap; height: auto; padding: 6px; }
    button.tool { font-size: 12px; padding: 5px 8px; }
  }
</style>
</head>
<body data-mode="select">
<div id="app">
  <header>
    <div class="title">🎯 <span id="titleName">새 작업</span></div>
    <div class="group">
      <button class="tool active icon" id="btnSelect" title="선택">🖱️</button>
      <button class="tool icon" id="btnArrow" title="화살표">➡️</button>
      <button class="tool icon" id="btnText" title="글자">🔤</button>
      <button class="tool icon" id="btnPan" title="이동">✋</button>
    </div>
    <div class="group">
      <label class="field"><span id="labelColor">색상</span><input type="color" id="inputColor" value="#222222"></label>
      <label class="field"><span id="labelThickness">굵기</span><input type="number" id="inputThickness" min="1" max="40" value="4"></label>
      <label class="field"><span id="labelFontSize">글자크기</span><input type="number" id="inputFontSize" min="8" max="160" value="28"></label>
      <label class="field"><span id="labelCenterFontSize">주제크기</span><input type="number" id="inputCenterFontSize" min="8" max="200" value="28"></label>
    </div>
    <div class="group">
      <button class="tool icon" id="btnEditCenter" title="주제 편집">🎯</button>
      <button class="tool icon" id="btnDelete" title="삭제" disabled>🗑️</button>
    </div>
    <div class="spacer"></div>
    <div class="group">
      <button class="tool icon" id="btnZoomIn" title="확대">➕</button>
      <button class="tool icon" id="btnZoomOut" title="축소">➖</button>
      <button class="tool icon" id="btnFit" title="맞춤">🔳</button>
    </div>
    <div class="group">
      <button class="tool icon" id="btnNew" title="새 작업">🆕</button>
      <button class="tool icon" id="btnSave" title="저장">💾</button>
      <button class="tool icon" id="btnSaveAs" title="새이름저장">📝</button>
      <button class="tool icon" id="btnWorks" title="작업 목록">📋</button>
      <button class="tool icon" id="btnExportPng" title="PNG 내보내기">🖼️</button>
      <button class="tool icon" id="btnExportJson" title="JSON 내보내기">📤</button>
      <button class="tool icon" id="btnImportJson" title="JSON 가져오기">📥</button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
      <button class="tool icon" id="btnLang" title="Switch to English">🌐</button>
    </div>
  </header>
  <div id="canvasWrap">
    <canvas id="mainCanvas"></canvas>
    <div id="statusBar"></div>
  </div>
</div>
<script src="dist/bundle.js"></script>
</body>
</html>
